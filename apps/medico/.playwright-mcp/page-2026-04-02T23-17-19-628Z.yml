  - main [ref=e19]:
    - generic [ref=e22]:
      - generic [ref=e23]:
        - heading "Términos de Servicio" [level=1] [ref=e24]
        - paragraph [ref=e25]: "Última actualización: abril 2025"
      - generic [ref=e26]:
        - heading "1. Aceptación de los Términos" [level=2] [ref=e27]
        - paragraph [ref=e28]: Al acceder y utilizar la plataforma Red Salud ("el Servicio"), usted acepta estar sujeto a estos Términos de Servicio. Si no está de acuerdo con alguna parte de estos términos, no podrá acceder al Servicio.
        - paragraph [ref=e29]: Red Salud es una plataforma digital diseñada para profesionales de la salud en Venezuela, que ofrece herramientas de gestión clínica, agenda, historia médica electrónica y comunicación con pacientes.
        - heading "2. Cuentas de Usuario" [level=2] [ref=e30]
        - heading "2.1 Registro" [level=3] [ref=e31]
        - paragraph [ref=e32]: Para utilizar el Servicio, debe crear una cuenta proporcionando información veraz y completa. Es su responsabilidad mantener la confidencialidad de sus credenciales de acceso.
        - heading "2.2 Verificación profesional" [level=3] [ref=e33]
        - paragraph [ref=e34]: Los usuarios que se registren como profesionales de la salud podrán ser sometidos a un proceso de verificación a través del Sistema Autónomo de Control Sanitario (SACS) u otros mecanismos de validación. Red Salud se reserva el derecho de suspender cuentas que no puedan ser verificadas.
        - heading "2.3 Responsabilidad de la cuenta" [level=3] [ref=e35]
        - paragraph [ref=e36]: Usted es responsable de toda la actividad que ocurra bajo su cuenta. Debe notificarnos inmediatamente ante cualquier uso no autorizado de su cuenta o cualquier otra violación de seguridad.
        - heading "3. Uso del Servicio" [level=2] [ref=e37]
        - heading "3.1 Uso permitido" [level=3] [ref=e38]
        - paragraph [ref=e39]: "El Servicio está destinado exclusivamente para:"
        - list [ref=e40]:
          - listitem [ref=e41]: Gestión de consultas médicas y registros clínicos por parte de profesionales de la salud debidamente registrados.
          - listitem [ref=e42]: Comunicación entre profesionales de la salud y sus pacientes.
          - listitem [ref=e43]: Administración de agendas, prescripciones y documentación médica digital.
        - heading "3.2 Uso prohibido" [level=3] [ref=e44]
        - paragraph [ref=e45]: "Queda expresamente prohibido:"
        - list [ref=e46]:
          - listitem [ref=e47]: Utilizar el Servicio para fines ilegales o no autorizados.
          - listitem [ref=e48]: Compartir credenciales de acceso con terceros no autorizados.
          - listitem [ref=e49]: Intentar acceder a datos de otros usuarios o consultorios sin autorización.
          - listitem [ref=e50]: Utilizar el Servicio para almacenar información que no esté relacionada con la práctica médica.
          - listitem [ref=e51]: Realizar ingeniería inversa o intentar vulnerar la seguridad de la plataforma.
        - heading "4. Privacidad y Datos Médicos" [level=2] [ref=e52]
        - paragraph [ref=e53]:
          - text: La protección de los datos médicos es nuestra máxima prioridad. El tratamiento de datos personales y datos de salud se rige por nuestra
          - link "Política de Privacidad" [ref=e54] [cursor=pointer]:
            - /url: /legal/privacidad
          - text: ", que forma parte integral de estos Términos."
        - paragraph [ref=e55]: Como profesional de la salud, usted es responsable de obtener el consentimiento informado de sus pacientes para el registro y almacenamiento de sus datos médicos en la plataforma, de conformidad con la legislación venezolana aplicable.
        - heading "5. Propiedad Intelectual" [level=2] [ref=e56]
        - heading "5.1 Propiedad de Red Salud" [level=3] [ref=e57]
        - paragraph [ref=e58]: La plataforma Red Salud, incluyendo su diseño, código fuente, logotipos, marcas y contenido original, son propiedad exclusiva de Red Salud. Ningún derecho de propiedad intelectual le es transferido por el uso del Servicio.
        - heading "5.2 Contenido del usuario" [level=3] [ref=e59]
        - paragraph [ref=e60]: Los datos clínicos, notas médicas y demás contenido que usted genere a través del Servicio son y seguirán siendo de su propiedad. Red Salud no reclama propiedad sobre sus datos clínicos.
        - heading "6. Planes y Pagos" [level=2] [ref=e61]
        - paragraph [ref=e62]:
          - text: Red Salud ofrece un plan gratuito con funcionalidades limitadas y planes de pago con funcionalidades extendidas. Los precios y las características de cada plan están publicados en nuestra
          - link "página de precios" [ref=e63] [cursor=pointer]:
            - /url: /precios
          - text: .
        - paragraph [ref=e64]: Red Salud se reserva el derecho de modificar los precios de los planes de pago con un aviso previo de al menos 30 días. Los cambios de precio no afectarán el período de facturación en curso.
        - heading "7. Cancelación" [level=2] [ref=e65]
        - heading "7.1 Cancelación por el usuario" [level=3] [ref=e66]
        - paragraph [ref=e67]: Puede cancelar su cuenta en cualquier momento desde la configuración de su perfil. Al cancelar, sus datos serán conservados durante 90 días, período en el cual podrá exportar toda su información. Transcurrido ese plazo, los datos serán eliminados de forma permanente.
        - heading "7.2 Cancelación por Red Salud" [level=3] [ref=e68]
        - paragraph [ref=e69]: Nos reservamos el derecho de suspender o cancelar cuentas que violen estos Términos de Servicio, con notificación previa cuando sea posible.
        - heading "8. Limitaciones de Responsabilidad" [level=2] [ref=e70]
        - paragraph [ref=e71]:
          - text: Red Salud es una herramienta de gestión clínica y
          - strong [ref=e72]: no reemplaza
          - text: el juicio profesional del médico. Las sugerencias generadas por inteligencia artificial (como códigos ICD-11) son orientativas y deben ser validadas por el profesional.
        - paragraph [ref=e73]: Red Salud no será responsable por decisiones médicas tomadas en base a la información presentada en la plataforma. El profesional de la salud mantiene en todo momento la responsabilidad sobre sus decisiones clínicas.
        - paragraph [ref=e74]: En la medida permitida por la legislación venezolana, Red Salud no será responsable por daños indirectos, incidentales, especiales o consecuentes que resulten del uso o la imposibilidad de uso del Servicio.
        - heading "9. Disponibilidad del Servicio" [level=2] [ref=e75]
        - paragraph [ref=e76]: Nos esforzamos por mantener el Servicio disponible de forma continua, pero no garantizamos una disponibilidad del 100%. Pueden ocurrir interrupciones por mantenimiento programado, actualizaciones o circunstancias fuera de nuestro control.
        - heading "10. Modificaciones a los Términos" [level=2] [ref=e77]
        - paragraph [ref=e78]: Red Salud puede modificar estos Términos de Servicio en cualquier momento. Las modificaciones serán notificadas a través de la plataforma y/o por correo electrónico con al menos 15 días de anticipación. El uso continuado del Servicio después de la entrada en vigor de las modificaciones constituye la aceptación de los nuevos términos.
        - heading "11. Legislación Aplicable" [level=2] [ref=e79]
        - paragraph [ref=e80]: Estos Términos de Servicio se rigen por las leyes de la República Bolivariana de Venezuela. Cualquier controversia será sometida a los tribunales competentes de la ciudad de Caracas.
        - heading "12. Contacto" [level=2] [ref=e81]
        - paragraph [ref=e82]:
          - text: Para cualquier consulta relacionada con estos Términos de Servicio, puede contactarnos en
          - link "soporte@redsalud.com" [ref=e83] [cursor=pointer]:
            - /url: mailto:soporte@redsalud.com
          - text: o a través de nuestro
          - link "formulario de contacto" [ref=e84] [cursor=pointer]:
            - /url: /contacto
          - text: .
