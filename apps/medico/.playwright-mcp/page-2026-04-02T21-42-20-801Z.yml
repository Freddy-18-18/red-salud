        - heading "Tu información médica está protegida" [level=1] [ref=e28]
        - paragraph [ref=e29]: La seguridad de los datos médicos no es opcional — es la base de todo lo que construimos. Cada capa de Red Salud fue diseñada con la protección de datos como prioridad.
      - generic [ref=e32]:
        - generic [ref=e33]:
          - img [ref=e35]
          - heading "Encriptación de datos en tránsito y en reposo" [level=3] [ref=e38]
          - paragraph [ref=e39]: Toda la comunicación entre tu navegador y nuestros servidores está protegida con TLS 1.3. Los datos almacenados están encriptados con AES-256.
        - generic [ref=e40]:
          - img [ref=e42]
          - heading "Row Level Security (RLS) en todas las tablas" [level=3] [ref=e47]
          - paragraph [ref=e48]: Cada registro en la base de datos tiene políticas de acceso granulares. Solo vos podés acceder a los datos de tus pacientes — ni siquiera otros médicos en la plataforma.
        - generic [ref=e49]:
          - img [ref=e51]
          - heading "Autenticación segura con Supabase Auth" [level=3] [ref=e54]
          - paragraph [ref=e55]: Sistema de autenticación probado por miles de empresas. Contraseñas hasheadas con bcrypt, tokens JWT con expiración corta, y soporte para autenticación de dos factores.
        - generic [ref=e56]:
          - img [ref=e58]
          - heading "Sin acceso a datos entre consultorios" [level=3] [ref=e63]
          - paragraph [ref=e64]: Aislamiento completo entre dominios. Los datos de tu consultorio son invisibles para otros consultorios, farmacias o laboratorios dentro de la plataforma.
        - generic [ref=e65]:
          - img [ref=e67]
          - heading "Backups automáticos" [level=3] [ref=e71]
          - paragraph [ref=e72]: Respaldos automáticos diarios de toda la información. En caso de cualquier incidente, tus datos están protegidos y pueden ser restaurados rápidamente.
        - generic [ref=e73]:
          - img [ref=e75]
          - heading "Infraestructura en la nube con alta disponibilidad" [level=3] [ref=e86]
          - paragraph [ref=e87]: Servidores distribuidos con redundancia geográfica. Monitoreo 24/7 y escalado automático para garantizar que la plataforma esté siempre disponible.
