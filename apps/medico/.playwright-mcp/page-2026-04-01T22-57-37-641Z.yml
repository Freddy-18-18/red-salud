      - generic [ref=e39]:
        - paragraph [ref=e40]: En cardiología, la diferencia entre un buen resultado y una emergencia puede ser cuestión de minutos. Tu sistema de gestión no puede ser el cuello de botella. Necesitás que la información llegue rápido, se interprete correctamente y dispare las alertas adecuadas.
        - paragraph [ref=e41]: Red Salud para Cardiología incluye un visor de ECG integrado con medición automática de intervalos, una cola de estudios pendientes (ECG, eco, Holter, prueba de esfuerzo) y un panel de alertas críticas que te notifica en tiempo real cuando un paciente presenta valores fuera de rango.
        - paragraph [ref=e42]: El módulo de ecocardiograma te permite registrar hallazgos estructurados con mediciones estandarizadas (FEVI, diámetros cavitarios, gradientes valvulares) y generar informes con un clic. Las pruebas de esfuerzo se documentan con protocolo Bruce o Naughton integrado.
        - paragraph [ref=e43]: La estratificación de riesgo cardiovascular se calcula automáticamente usando Framingham, ASCVD y SCORE, poblándose con datos que ya están en la historia clínica del paciente.
